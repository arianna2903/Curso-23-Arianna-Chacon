<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmatodo</title>
  <link rel="stylesheet" href="./styles.css">
</head>
  <body>
    <nav>
      <div class="izquierda">
        <div>
          <img 
            src="https://www.farmatodo.com.ve/assets/svg/logo-farmatodo-blue.svg" 
            alt="Farmatodo Logo"
          />
        </div>
        <div> 
          <div>Venezuela</div>
          <div>1 USD = 97.42 Bs</div>
        </div>
      </div>
      <div>
        <div class="centro">
          <button>
            Categorias
          </button>
          <input type="text" placeholder="Busca aqui tu producto">
          <button>
            <img 
              src="lupa.png"
              alt="Search Icon"
            />
          </button>
        </div>
      </div>
      <div class="derecha">
        <div>
          <p>Inicia sesion</p>
        </div>
        <div>
          <p>Caracas</p>
        </div>
        <p>Campana</p>
        <p>Carrito</p>
      </div>
    </nav>
  </body>
</html>
