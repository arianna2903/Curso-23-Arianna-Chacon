<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    let number = prompt("Ingrese un numero del 1 al 3")
    if (number < 1 || number > 3) {
      alert("Por favor ingrese un número válido.")
    } else if (number == 1) {
      alert("Rojo, detente")
    } else if (number == 2) {
      alert ("Amarillo, precaución")
    } else if (number == 3) {
      alert("Verde, avanza")
    }
  </script>
</body>
</html>
