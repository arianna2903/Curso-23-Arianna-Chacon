<body>
  <script>
    let frutas = ["cambur", "piña", "platano", "lechoza", "melon", "patilla", "uva", "fresa", "kiwi", "limon", "naranja", "toronja", "ciruela", "pasas", "manzana", "pera"]
    function mercado(frutas, indice) {
      if (indice === frutas.length) return; 
      console.log(frutas[indice])
      mercado(frutas, indice + 1);
    }
    mercado(frutas, 0)
  </script>
